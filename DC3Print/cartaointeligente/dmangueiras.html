<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMangueiras & Conecções - Cartão de Visitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="business-card">
    <div class="card-header">
      <h1 class="company-name">DMangueiras & Conecções</h1>
    </div>

    <div class="contacts-stack">
      <!-- WhatsApp -->
      <a href="https://wa.me/5551983104992" target="_blank" class="contact-card whatsapp-card">
        <div class="contact-icon">
          <i class="fab fa-whatsapp"></i>
        </div>
        <div class="contact-info">
          <span class="contact-label">WhatsApp</span>
          <span class="contact-value">+55 51 98310-4992</span>
        </div>
        <div class="arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>

      <!-- Telefone -->
      <a href="tel:05133913218" class="contact-card phone-card">
        <div class="contact-icon">
          <i class="fas fa-phone"></i>
        </div>
        <div class="contact-info">
          <span class="contact-label">Telefone</span>
          <span class="contact-value">(51) 3391-3218</span>
        </div>
        <div class="arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>

      <!-- Email -->
      <a href="mailto:contato@dmangueiraseconexoes.com.br" class="contact-card email-card">
        <div class="contact-icon">
          <i class="fas fa-envelope"></i>
        </div>
        <div class="contact-info">
          <span class="contact-label">Email</span>
          <span class="contact-value">contato@dmangueiraseconexoes.com.br</span>
        </div>
        <div class="arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>

      <!-- Instagram -->
      <a href="https://www.instagram.com/dmangueiraseconexoes/" target="_blank" class="contact-card instagram-card">
        <div class="contact-icon">
          <i class="fab fa-instagram"></i>
        </div>
        <div class="contact-info">
          <span class="contact-label">Instagram</span>
          <span class="contact-value">@dmangueiraseconexoes</span>
        </div>
        <div class="arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>

      <!-- Localização -->
      <div class="contact-card location-card">
        <div class="contact-icon">
          <i class="fas fa-map-marker-alt"></i>
        </div>
        <div class="contact-info">
          <span class="contact-label">Localização</span>
          <span class="contact-value">Est. Cristiano Kraemer, 1420 - Campo Novo, Porto Alegre - RS</span>
        </div>
      </div>

      <!-- Mapa -->
      <div class="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3450.8274574464986!2d-51.2017216!3d-30.127750400000004!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x951983150dbd0bd5%3A0x754c3085a1c3d48f!2zRE0gTWFuZ3VlaXJhcyAmIENvbmVjw6fDtWVz!5e0!3m2!1spt-BR!2sbr!4v1780950283281!5m2!1spt-BR!2sbr" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>

    <footer class="card-footer">
      <p>&copy; 2026 DC3 Print</p>
      <span>Desenvolvido por
<a href="http://viniciusavila.com.br" target="_blank" rel="noopener noreferrer">
        Vinicius Avila</a>
      </span>
      
    </footer>
  </div>
</body>
</html>
